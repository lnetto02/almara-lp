    :root {
      --brown-dark: #382F2D;
      --taupe: #857B79;
      --cream: #F0E6DD;
      --teal: #3F676B;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--brown-dark);
      color: var(--cream);
      font-family: 'SweetSansPro', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── HERO ─── */
    .hero-scroll-container {
      height: 400vh;
      position: relative;
    }

    .hero-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    .hero-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 12vh;
      gap: 1.5rem;
    }

    .scroll-indicator {
      position: absolute;
      bottom: 3vh;
      left: 50%;
      transform: translateX(-50%);
      opacity: 1;
      transition: opacity 0.6s ease;
    }

    .scroll-indicator.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .scroll-indicator-line {
      width: 1px;
      height: 44px;
      background: var(--cream);
      margin: 0 auto;
      animation: scrollPulse 1.8s ease-in-out infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.25; transform: scaleY(0.85); }
      50%       { opacity: 1;    transform: scaleY(1.15); }
    }

    .hero-logo {
      width: clamp(220px, 35vw, 520px);
    }

    .hero-logo svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .hero-tagline {
      text-align: center;
      line-height: 1.6;
    }

    .tagline-line {
      display: block;
    }

    .tagline-sans {
      font-family: 'SweetSansPro', sans-serif;
      font-weight: 300;
      letter-spacing: 0.35em;
      font-size: clamp(0.65rem, 1.3vw, 1rem);
      text-transform: uppercase;
      color: var(--cream);
    }

    .tagline-script {
      font-family: 'GoldenHopes', cursive;
      font-size: clamp(1.3rem, 2.6vw, 1.9rem);
      color: var(--cream);
      letter-spacing: 0.02em;
      vertical-align: middle;
    }

    /* ─── LOCALIZAÇÃO ─── */
    .location-section {
      background: var(--brown-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      gap: 40px;
    }

    .section-title {
      font-family: 'SweetSansPro', sans-serif;
      font-weight: 300;
      font-size: clamp(0.6rem, 1.1vw, 0.85rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--cream);
    }

    .location-map {
      width: 100%;
      max-width: 900px;
      height: 420px;
      border: 1px solid rgba(240,230,221,0.15);
      border-radius: 4px;
      overflow: hidden;
    }

    .location-map iframe {
      width: 100%;
      height: 100%;
      border: none;
      filter: grayscale(30%) sepia(20%);
    }

    .location-address {
      font-family: 'SweetSansPro', sans-serif;
      font-weight: 300;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(240,230,221,0.6);
      text-align: center;
    }

  /* ─── FORMULÁRIO ─── */
  .form-section {
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
    gap: 52px;
  }

  .form-title {
    font-family: 'SweetSansPro', sans-serif;
    font-weight: 300;
    font-size: clamp(0.6rem, 1.1vw, 0.85rem);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--brown-dark);
    text-align: center;
  }

  .contact-form {
    width: 100%;
    max-width: 860px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 52px;
  }

  .form-fields {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 36px;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .form-field label {
    font-family: 'SweetSansPro', sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--brown-dark);
  }

  .form-field input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(56,47,45,0.4);
    padding: 8px 0 10px;
    font-family: 'SweetSansPro', sans-serif;
    font-weight: 300;
    font-size: 0.9rem;
    color: var(--brown-dark);
    outline: none;
    width: 100%;
    transition: border-color 0.3s;
  }

  .form-field input:focus {
    border-bottom-color: var(--brown-dark);
  }

  .form-field input::placeholder {
    color: rgba(56,47,45,0.35);
  }

  .form-submit {
    background: var(--brown-dark);
    color: var(--cream);
    border: none;
    padding: 18px 56px;
    font-family: 'SweetSansPro', sans-serif;
    font-weight: 500;
    font-size: 0.65rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  .form-submit:hover {
    background: var(--teal);
  }

  /* ─── RODAPÉ ─── */
  footer {
    background: var(--brown-dark);
    padding: 48px 40px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }

  .footer-brand {
    font-family: 'SweetSansPro', sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(240,230,221,0.45);
  }

  .footer-divider {
    width: 1px;
    height: 24px;
    background: rgba(240,230,221,0.2);
    margin: 4px auto;
  }

  /* ─── MOBILE ─── */
  @media (max-width: 768px) {
    .hero-logo {
      width: clamp(160px, 70vw, 300px);
    }

    .tagline-sans {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
    }

    .tagline-script {
      font-size: 1.15rem;
    }

    .hero-overlay {
      padding-bottom: 10vh;
      gap: 1rem;
    }

    .location-section,
    .form-section {
      padding: 60px 24px;
    }

    .location-map {
      height: 260px;
    }

    .form-fields {
      grid-template-columns: 1fr;
      gap: 28px;
    }

    .form-submit {
      width: 100%;
      padding: 18px 24px;
    }

    footer {
      padding: 40px 24px;
    }
  }
  </style>
</head>

    </iframe>
  </div>
  <p class="location-address">Condomínio Ecoville São Manoel &nbsp;·&nbsp; Sorriso, Mato Grosso</p>
</section>

<!-- FORMULÁRIO -->
<section class="form-section">
  <h2 class="form-title">Tenha acesso exclusivo</h2>
  <form class="contact-form" id="contactForm">
    <div class="form-fields">
      <div class="form-field">
        <label for="name">Nome</label>
        <input type="text" id="name" name="name" placeholder="Seu nome completo" required>
      </div>
      <div class="form-field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
      </div>
      <div class="form-field">
        <label for="phone">Telefone</label>
        <input type="tel" id="phone" name="phone" placeholder="(00) 00000-0000" required>
      </div>
    </div>
    <button type="submit" class="form-submit">Quero saber mais</button>
  </form>
</section>

<!-- RODAPÉ -->
<footer>
  <p class="footer-brand">Epicentro Empreendimentos</p>
  <div class="footer-divider"></div>
  <p class="footer-brand">© 2026 Almara São Manoel</p>
</footer>

<script>
  const video     = document.getElementById('heroVideo');
  const hero      = document.getElementById('hero');
  const indicator = document.getElementById('scrollIndicator');
  let ticking = false;

  function updateVideo() {
    const maxScroll = hero.offsetHeight - window.innerHeight;
    const progress  = Math.min(Math.max(window.scrollY / maxScroll, 0), 1);

    if (video.readyState >= 2 && video.duration) {
      video.currentTime = progress * video.duration;
    }

    if (window.scrollY > 80) {
      indicator.classList.add('hidden');
    } else {
      indicator.classList.remove('hidden');
    }
  }

  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => { updateVideo(); ticking = false; });
      ticking = true;
    }
  });

  video.load();

  document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    alert('Obrigado, ' + name + '! Em breve nossa equipe entrará em contato.');
    this.reset();
  });
</script>
</body>
</html>
